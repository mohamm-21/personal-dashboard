<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mohammed Almousa</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d1b2e;
      --card: #112240;
      --text: #ffffff;
      --subtext: #90aac8;
      --accent: #4f8ef7;
      --border: #1e3a5f;
    }
    :root[data-theme="light"] {
      --bg: #ff0000;
      --card: #ffffff;
      --text: #0d1b2e;
      --subtext: #4a6fa5;
      --accent: #2563eb;
      --border: #b8d4f8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      transition: background 0.3s, color 0.3s;
    }

    .toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.2rem;
    }

    h1 { font-size: 1.6rem; margin-bottom: 0.3rem; }

    .role {
      color: var(--subtext);
      font-size: 0.95rem;
      margin-bottom: 1.8rem;
    }

    .links { display: flex; flex-direction: column; gap: 0.75rem; }

    .link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .link:hover { border-color: var(--accent); color: var(--accent); }

    .link-icon { font-size: 1.2rem; }

    .clock {
      margin-top: 1.8rem;
      color: var(--subtext);
      font-size: 0.9rem;
    }

    #time { font-size: 1.4rem; font-weight: 600; color: var(--text); margin-top: 0.2rem; }
  </style>
</head>
<body>

  <button class="toggle" onclick="toggleTheme()">🌓 Toggle Theme</button>

  <div class="card">
    <div class="avatar">👤</div>
    <h1>Mohammed Almousa</h1>
    <p class="role">Product Manager</p>

    <div class="links">
      <a href="https://github.com/mohamm-21" target="_blank" class="link">
        <span class="link-icon">🐙</span> GitHub — mohamm-21
      </a>
    </div>

    <div class="clock">
      <div>Local Time</div>
      <div id="time"></div>
    </div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();
      document.getElementById('time').textContent = now.toLocaleTimeString();
    }
    updateTime();
    setInterval(updateTime, 1000);

    function toggleTheme() {
      const html = document.documentElement;
      html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }
  </script>

</body>
</html>
